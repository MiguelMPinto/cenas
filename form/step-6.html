<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AuraPic - Review</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="form-page" data-step-index="6">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="../index.html">AuraPic</a>
      <nav class="nav">
        <a class="btn small" href="step-1.html" aria-current="page">Pedir resultado</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container form-container">
      <h1>Fotos Profissionais com AI</h1>
      <p class="lead">Passo 6 de 6. Revê os dados e submete.</p>

      <div class="card mt progress-card" aria-live="polite">
        <div class="progress-head">
          <strong id="wizardStepLabel">Step 6 de 6</strong>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <p class="muted small" id="progressText">0 de 8 campos obrigatorios completos</p>
        <p class="muted small" id="progressHint">Tudo pronto para submissao.</p>
      </div>

      <section class="nice-form mt">
        <div class="step-card">
          <div class="step-head">
            <h3>Review / Resumo</h3>
          </div>

          <div id="reviewContent" class="review-grid"></div>

          <p class="small field-error" data-error-for="email"></p>
          <p class="small field-error" data-error-for="facePhotos"></p>
          <p class="small field-error" data-error-for="fullBodyPhotos"></p>
          <p class="small field-error" data-error-for="outfit1Photos"></p>
          <p class="small field-error" data-error-for="outfit2Photos"></p>
          <p class="small field-error" data-error-for="bg1"></p>
          <p class="small field-error" data-error-for="bg2Photo"></p>
          <p class="small field-error" data-error-for="pose"></p>
        </div>

        <div class="actions">
          <button class="btn ghost" type="button" data-action="back">Voltar</button>
          <button class="btn btn-submit" type="button" data-action="submit">Submeter</button>
        </div>

        <p class="muted small" id="formMsg" aria-live="polite"></p>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="muted">&copy; 2026 AuraPic</span>
      <span class="muted">Contacto: (mete aqui email/IG)</span>
    </div>
  </footer>

  <script src="../app.js"></script>
</body>
</html>
