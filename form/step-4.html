<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AuraPic - Step 4</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="form-page" data-step-index="4">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="../index.html">AuraPic</a>
      <nav class="nav">
        <a class="btn small" href="step-1.html" aria-current="page">Pedir resultado</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container form-container">
      <h1>Fotos Profissionais com AI</h1>
      <p class="lead">Passo 4 de 6. Cenario e posicao.</p>

      <div class="card mt progress-card" aria-live="polite">
        <div class="progress-head">
          <strong id="wizardStepLabel">Step 4 de 6</strong>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <p class="muted small" id="progressText">0 de 8 campos obrigatorios completos</p>
        <p class="muted small" id="progressHint">Define fundo e posicao.</p>
      </div>

      <section class="nice-form mt">
        <div class="step-card">
          <div class="step-head">
            <h3>Passo 4 - Cenario e posicao</h3>
          </div>

          <div class="field">
            <label for="bg1">Fundo Corporate para Outfit no1 *</label>
            <select id="bg1" name="bg1" required>
              <option value="" selected disabled>Seleciona</option>
              <option>Branco</option>
              <option>Preto</option>
              <option>Cinzento</option>
              <option>Beige</option>
            </select>
            <p class="small field-error" data-error-for="bg1"></p>
          </div>

          <div class="field">
            <label for="bg2Photo">Fundo a escolha para Outfit no2 (1 foto do local) *</label>
            <input id="bg2Photo" name="bg2Photo" type="file" accept="image/*" data-min="1" data-max="1" />
            <div class="previews" id="bg2PhotoPreviews"></div>
            <p class="muted small" id="bg2PhotoStatus">Nenhum ficheiro guardado.</p>
            <button class="btn ghost small" type="button" data-clear-files="bg2Photo">Limpar ficheiro</button>
            <p class="small field-error" data-error-for="bg2Photo"></p>
          </div>

          <div class="field">
            <label>Para o outfit no2 e fundo a escolha, como pretende que seja a sua posicao? *</label>
            <div class="radio-row">
              <label class="radio radio-card">
                <input type="radio" name="pose" value="Em pe" />
                <span class="radio-card-ui">
                  <span class="radio-indicator" aria-hidden="true"></span>
                  <span class="radio-label">Em pe</span>
                  <span class="radio-check" aria-hidden="true">✓</span>
                </span>
              </label>
              <label class="radio radio-card">
                <input type="radio" name="pose" value="Sentado" />
                <span class="radio-card-ui">
                  <span class="radio-indicator" aria-hidden="true"></span>
                  <span class="radio-label">Sentado</span>
                  <span class="radio-check" aria-hidden="true">✓</span>
                </span>
              </label>
            </div>
            <p class="small field-error" data-error-for="pose"></p>
          </div>
        </div>

        <div class="actions">
          <button class="btn ghost" type="button" data-action="back">Voltar</button>
          <button class="btn btn-submit" type="button" data-action="next">Seguinte</button>
        </div>

        <p class="muted small" id="formMsg" aria-live="polite"></p>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="muted">&copy; 2026 AuraPic</span>
      <span class="muted">Contacto: (mete aqui email/IG)</span>
    </div>
  </footer>

  <script src="../app.js"></script>
</body>
</html>
